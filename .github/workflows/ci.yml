name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: jdx/mise-action@v2

            - run: bun install --frozen-lockfile
            - run: bun run check
            - run: bun run typecheck
            - run: bun run test
            - run: bun run build
